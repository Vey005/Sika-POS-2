name: Deploy Portal

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/portal/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/portal/package-lock.json

    - name: Install dependencies
      run: cd backend/portal && npm ci

    - name: Build portal
      run: cd backend/portal && npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: backend/portal/dist
        cname: portal.sikapos.com